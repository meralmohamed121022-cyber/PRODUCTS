<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO SYSTEM - ADVANCED PRODUCT HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --primary: #059669;
            --secondary: #10b981;
            --accent: #3b82f6;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: #fbbf24;
        }

        /* Hero & Search */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        .scanner-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .scanner-btn:active { transform: translateY(-50%) scale(0.9); }

        /* Multi-select Filters */
        .filters-grid {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-box {
            background: var(--card-dark);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .custom-dropdown {
            position: relative;
            cursor: pointer;
        }

        .dropdown-trigger {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .dropdown-menu.show { display: block; }

        .dropdown-item {
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .dropdown-item:hover { background: rgba(255,255,255,0.05); }

        .dropdown-item label {
            user-select: none;
        }

        .dropdown-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .dropdown-search {
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 2;
        }

        .dropdown-search input {
            width: 100%;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: white;
            outline: none;
        }

        /* Magazine Layout */
        .magazine-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .category-header {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 40px 0 20px;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
        }

        .subcat-header {
            display: inline-block;
            background: #334155;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 700;
            margin: 20px 0;
        }

        .items-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }

        .blob-container {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            position: relative;
        }

        .blob-title {
            position: absolute;
            top: -12px;
            right: 25px;
            background: var(--primary);
            padding: 4px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* Printing Styles */
        @media print {
            body { background: white !important; color: black !important; }
            .navbar, .hero, .filters-grid, .load-more-trigger, .scroll-top, .print-fab { display: none !important; }
            
            #mainContainer { width: 100% !important; padding: 0 !important; margin: 0 !important; }
            
            .category-header { 
                background: #f1f5f9 !important; 
                color: black !important; 
                border: 2px solid #334155 !important;
                margin: 20px 0 10px !important;
                font-size: 1.4rem !important;
                padding: 10px !important;
                page-break-after: avoid;
            }

            .items-row { display: block !important; }

            .blob-container { 
                background: none !important; 
                border: 1px solid #e2e8f0 !important; 
                margin-bottom: 20px !important;
                padding: 15px !important;
                page-break-inside: avoid;
            }

            .blob-title { 
                position: static !important;
                background: #334155 !important;
                color: white !important;
                display: inline-block !important;
                margin-bottom: 10px !important;
            }

            .product-grid { 
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important; 
                gap: 10px !important; 
            }

            .product-card { 
                border: 1px solid #cbd5e1 !important; 
                box-shadow: none !important;
                break-inside: avoid;
                padding: 8px !important;
            }

            .img-stack { height: 120px !important; }
            .name-ar { font-size: 0.75rem !important; }
            .name-en { font-size: 0.65rem !important; }
            .price-val { font-size: 1rem !important; }

            @page { margin: 10mm; size: A4; }
        }

        /* Card Styles */
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover { transform: translateY(-5px); }

        .img-stack {
            width: 100%;
            aspect-ratio: 1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .img-stack img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .stack-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: var(--accent);
            color: white;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .card-details { display: flex; flex-direction: column; gap: 4px; }
        .brand-text { font-size: 0.7rem; color: var(--primary); font-weight: 900; }
        .name-ar { font-size: 0.9rem; font-weight: 900; line-height: 1.3; }
        .name-en { font-size: 0.75rem; color: #64748b; font-weight: 600; }

        .price-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .price-val {
            font-size: 1.2rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .riyal-img { width: 14px; height: 14px; filter: contrast(0.5); }

        /* Scanner Modal */
        #scannerModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scanner-box {
            width: 90%;
            max-width: 500px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        #reader { width: 100%; }

        .close-scanner {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        /* Loading More */
        .load-more-trigger {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            font-weight: 700;
        }

        /* Scroll Top & Print FAB */
        .scroll-top, .print-fab {
            position: fixed;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: none;
            color: white;
            font-size: 24px;
        }

        .scroll-top, .print-fab, .view-toggle-btn {
            position: fixed;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: none;
            color: white;
            font-size: 22px;
            transition: all 0.3s;
        }

        .scroll-top { bottom: 20px; background: var(--primary); display: none; }
        .print-fab { bottom: 90px; background: #ef4444; }
        .view-toggle-btn { bottom: 160px; background: #f59e0b; }

        .reset-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .reset-btn:hover { background: #dc2626; transform: scale(1.05); }

        /* Magazine Controls */
        .mag-nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 4500;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .mag-nav-arrow:hover { background: rgba(255,255,255,0.2); width: 80px; }
        .mag-nav-arrow.left { left: 0; border-radius: 0 50px 50px 0; }
        .mag-nav-arrow.right { right: 0; border-radius: 50px 0 0 50px; }

        .mag-page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900;
            color: #fbbf24;
            display: none;
            z-index: 4500;
        }

        /* Responsive Grid / Slider */
        @media (max-width: 768px) {
            .product-grid {
                display: flex !important;
                overflow-x: auto !important;
                scroll-snap-type: x mandatory !important;
                gap: 15px !important;
                padding-bottom: 15px !important;
                scrollbar-width: none;
            }
            .product-grid::-webkit-scrollbar { display: none; }
            .product-card {
                flex: 0 0 70% !important; /* Slightly smaller for better 'peek' at next card */
                scroll-snap-align: center !important;
            }
            .magazine-page-view { 
                padding: 20px !important; 
                margin: 20px 15px 80px !important; /* Side margins to show background */
                min-height: 600px !important;
                border-radius: 5px !important;
                box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
            }
        }

        .print-fab:hover, .view-toggle-btn:hover, .scroll-top:hover { transform: scale(1.1); }

        .print-fab:hover, .view-toggle-btn:hover { transform: scale(1.1); transition: 0.2s; }

        /* Loading More */
        .load-more-trigger {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            font-weight: 700;
        }

        /* Scroll Top */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 500;
        }
    </style>
</head>
<body>

    <div id="scannerModal">
        <div class="scanner-box">
            <button class="close-scanner" onclick="stopScanner()">✕</button>
            <div id="reader"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">🌙 MONO PRODUCT HUB</div>
        <div style="font-size: 0.8rem; font-weight: 800; color: #94a3b8;">SYSTEM v2.5</div>
    </nav>

    <div class="hero">
        <div class="search-container">
            <input type="text" id="globalSearch" class="search-bar" placeholder="Search by name, code, or scan barcode..." oninput="triggerFilter()">
            <button class="scanner-btn" onclick="startScanner()">📷</button>
        </div>
    </div>

    <div class="filters-grid">
        <div class="filter-box" data-field="Brand">
            <div class="filter-label">Brand</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Brands <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search brands..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level A">
            <div class="filter-label">Category A</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat A <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level B">
            <div class="filter-label">Category B</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat B <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level C">
            <div class="filter-label">Category C</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat C <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level D">
            <div class="filter-label">Category D</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat D <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search sub-cats..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level E">
            <div class="filter-label">Category E</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat E <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Manufacture">
            <div class="filter-label">Manufacture</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Mans <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search manufactures..." oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
    </div>
    <div style="text-align:center; padding:10px;">
        <button class="reset-btn" onclick="resetFilters()">RESET ALL FILTERS 🔄</button>
    </div>

    <main class="magazine-grid" id="mainContainer"></main>
    <div id="loadMoreTrigger" class="load-more-trigger">Loading more products...</div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>
    <button class="print-fab" onclick="window.print()" title="Print">🖨️</button>
    <button class="view-toggle-btn" onclick="toggleViewMode()" title="Toggle Preview/Infinite">📖</button>

    <button class="mag-nav-arrow left" id="magPrev" onclick="changePage(-1)">❮</button>
    <button class="mag-nav-arrow right" id="magNext" onclick="changePage(1)">❯</button>
    <div class="mag-page-indicator" id="magIndicator">PAGE 1 OF 1</div>

    <script>
        const DB_URLS = [
            "https://raw.githubusercontent.com/meralmohamed121022-cyber/offerstestgit/refs/heads/main/products1.json",
            "https://raw.githubusercontent.com/meralmohamed121022-cyber/offerstestgit/refs/heads/main/products2.json"
        ];
        const WORKER_IMG = "https://online.meralmohamed121022.workers.dev/api/product?code=";
        const RIYAL_SVG = "https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg";

        let masterData = [];
        let filteredData = [];
        let displayedCount = 0;
        const BATCH_SIZE = 50;
        let isPageMode = false;
        let currentPage = 1;
        const ITEMS_PER_PAGE = 16; // 4 rows x 4 columns = 16 items

        let selectedFilters = { 
            "Brand": [], 
            "Category Level A": [], 
            "Category Level B": [], 
            "Category Level C": [], 
            "Category Level D": [], 
            "Category Level E": [], 
            "Manufacture": [] 
        };

        // Initialize
        async function bootstrap() {
            try {
                const responses = await Promise.all(DB_URLS.map(u => fetch(u)));
                const data = await Promise.all(responses.map(r => r.json()));
                masterData = data.flat();
                filteredData = [...masterData];
                
                initFilters();
                renderBatch();
                setupInfiniteScroll();
            } catch (err) { console.error(err); }
        }

        // Filters UI
        function initFilters() {
            const filterMap = { 
                "Brand": new Set(), 
                "Category Level A": new Set(), 
                "Category Level B": new Set(), 
                "Category Level C": new Set(), 
                "Category Level D": new Set(), 
                "Category Level E": new Set(), 
                "Manufacture": new Set() 
            };
            masterData.forEach(p => {
                for (let key in filterMap) { if (p[key]) filterMap[key].add(p[key]); }
            });

            document.querySelectorAll('.filter-box').forEach(box => {
                const field = box.dataset.field;
                const list = box.querySelector('.dropdown-list');
                const sortedItems = Array.from(filterMap[field]).sort();
                
                sortedItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerHTML = `<label style="display:flex; align-items:center; gap:10px; width:100%; cursor:pointer; padding: 8px 15px;">
                        <input type="checkbox" value="${item}" onchange="onFilterChange(this, '${field}')"> 
                        <span>${item}</span>
                    </label>`;
                    list.appendChild(div);
                });
            });
        }

        function toggleDropdown(el, event) {
            if (event.target.closest('.dropdown-menu')) return;
            document.querySelectorAll('.dropdown-menu').forEach(m => { 
                if(m !== el.querySelector('.dropdown-menu')) m.classList.remove('show'); 
            });
            el.querySelector('.dropdown-menu').classList.toggle('show');
        }

        function filterDropdownItems(input) {
            const term = input.value.toLowerCase();
            input.closest('.dropdown-menu').querySelectorAll('.dropdown-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        }

        function onFilterChange(cb, field) {
            if (cb.checked) selectedFilters[field].push(cb.value);
            else selectedFilters[field] = selectedFilters[field].filter(v => v !== cb.value);
            
            cb.closest('.filter-box').querySelector('.selected-count').textContent = `(${selectedFilters[field].length})`;
            applyAllFilters();
        }

        // Filter Logic
        let filterTimeout;
        function triggerFilter() { clearTimeout(filterTimeout); filterTimeout = setTimeout(applyAllFilters, 300); }

        function applyAllFilters() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            
            filteredData = masterData.filter(p => {
                const mq = !q || p.Code.toString().includes(q) || 
                          (p["Item Description"]||"").toLowerCase().includes(q) || 
                          (p["أسم المنتج"]||"").toLowerCase().includes(q);
                
                let mf = true;
                for (let field in selectedFilters) {
                    if (selectedFilters[field].length > 0 && !selectedFilters[field].includes(p[field])) { mf = false; break; }
                }
                return mq && mf;
            });

            displayedCount = 0;
            currentPage = 1;
            document.getElementById('mainContainer').innerHTML = '';
            if (isPageMode) renderPage(); else renderBatch();
        }

        function resetFilters() {
            document.getElementById('globalSearch').value = '';
            for (let field in selectedFilters) {
                selectedFilters[field] = [];
                // Reset checkbox UI
                const dropdown = document.querySelector(`.filter-box[data-field="${field}"]`);
                if(dropdown) {
                    dropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    dropdown.querySelector('.selected-count').textContent = '(0)';
                }
            }
            applyAllFilters();
        }

        function toggleViewMode() {
            isPageMode = !isPageMode;
            const arrows = document.querySelectorAll('.mag-nav-arrow');
            arrows.forEach(a => a.style.display = isPageMode ? 'flex' : 'none');
            document.getElementById('magIndicator').style.display = isPageMode ? 'block' : 'none';
            document.getElementById('loadMoreTrigger').style.display = isPageMode ? 'none' : 'block';
            
            if (isPageMode) {
                document.body.style.background = "linear-gradient(45deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)";
            } else {
                document.body.style.background = "var(--bg-dark)";
            }

            displayedCount = 0;
            currentPage = 1;
            document.getElementById('mainContainer').innerHTML = '';
            if (isPageMode) renderPage(); else renderBatch();
        }

        function changePage(dir) {
            const max = Math.ceil(filteredData.length / ITEMS_PER_PAGE);
            if (currentPage + dir < 1 || currentPage + dir > max) return;
            currentPage += dir;
            document.getElementById('mainContainer').innerHTML = '';
            renderPage();
            // Smoother scroll to the beginning of the magazine container rather than full top
            const container = document.getElementById('mainContainer');
            window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        }

        function renderPage() {
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const batch = filteredData.slice(start, start + ITEMS_PER_PAGE);
            document.getElementById('magIndicator').textContent = `PAGE ${currentPage} OF ${Math.ceil(filteredData.length / ITEMS_PER_PAGE)}`;
            renderToGrid(batch);
        }

        // Rendering Logic (Pagination)
        function renderBatch() {
            const batch = filteredData.slice(displayedCount, displayedCount + BATCH_SIZE);
            if (batch.length === 0) {
                document.getElementById('loadMoreTrigger').style.display = displayedCount > 0 ? 'none' : 'block';
                if (displayedCount === 0) document.getElementById('mainContainer').innerHTML = '<div style="text-align:center; padding:40px; font-weight:900; opacity:0.5;">No products match your filters.</div>';
                return;
            }
            renderToGrid(batch, true);
            displayedCount += batch.length;
            document.getElementById('loadMoreTrigger').style.display = displayedCount < filteredData.length ? 'block' : 'none';
        }

        function getColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            const h = Math.abs(hash) % 360;
            // Use high saturation and medium lightness for clarity
            return `hsl(${h}, 70%, 45%)`;
        }

        function renderToGrid(items, append = false) {
            const container = document.getElementById('mainContainer');
            if (!append) container.innerHTML = '';

            const groups = {};
            items.forEach(p => {
                const a = p["Category Level A"] || "UNCATEGORIZED";
                const d = p["Category Level D"] || "OTHER";
                if(!groups[a]) groups[a] = {};
                if(!groups[a][d]) groups[a][d] = [];
                groups[a][d].push(p);
            });

            let targetContainer = container;
            if (isPageMode && !append) {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'magazine-page-view';
                pageWrapper.style.cssText = "background:white; color:black; padding:40px; border-radius:10px; box-shadow:0 20px 50px rgba(0,0,0,0.5); min-height:800px; max-width:1100px; margin:0 auto 50px;";
                container.appendChild(pageWrapper);
                targetContainer = pageWrapper;
            }

            Object.entries(groups).forEach(([catA, subCats]) => {
                let sectionA = isPageMode ? null : document.getElementById(`sec-a-${catA.replace(/\W/g,'')}`);
                if (!sectionA) {
                    const colorA = getColor(catA);
                    sectionA = document.createElement('div');
                    if (!isPageMode) sectionA.id = `sec-a-${catA.replace(/\W/g,'')}`;
                    sectionA.innerHTML = `<div class="category-header" style="${isPageMode ? `background:${colorA}; color:white; border:none; box-shadow: 0 4px 15px ${colorA}44;` : ''}">${catA}</div>`;
                    targetContainer.appendChild(sectionA);
                }

                Object.entries(subCats).forEach(([catD, itemsList]) => {
                    let blob = isPageMode ? null : sectionA.querySelector(`[data-blob="${catD}"]`);
                    if (!blob) {
                        const colorD = getColor(catD + "sub"); // Offset for variety
                        blob = document.createElement('div');
                        blob.className = 'blob-container';
                        if (!isPageMode) blob.dataset.blob = catD;
                        blob.style.cssText = isPageMode ? `border:2px solid ${colorD}; background:none; padding:15px; margin-bottom:20px; border-radius:15px;` : "";
                        blob.innerHTML = `<div class="blob-title" style="${isPageMode ? `position:static; background:${colorD}; margin-bottom:10px; color:white;` : ''}">${catD}</div><div class="product-grid" style="${isPageMode ? 'grid-template-columns: repeat(4, 1fr);' : ''}"></div>`;
                        sectionA.appendChild(blob);
                    }
                    const grid = blob.querySelector('.product-grid');
                    
                    itemsList.forEach(main => {
                        const brand = main.Brand || 'Generic';
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        if (isPageMode) card.style.cssText = "border:1px solid #cbd5e1; box-shadow:none; padding:8px;";
                        card.onclick = () => window.open(`https://www.al-dawaa.com/en/p/${main.Code}`, '_blank');
                        
                        card.innerHTML = `
                            <div class="img-stack" style="${isPageMode ? 'height:120px;' : ''}">
                                <img src="${getBestImg(main)}" data-code="${main.Code}" onerror="imgErr(this, '${main.Code}')">
                            </div>
                            <div class="card-details">
                                <span class="brand-text">${brand}</span>
                                <div class="name-ar" style="${isPageMode ? 'font-size:0.75rem;' : ''}">${main["أسم المنتج"] || ''}</div>
                                <div class="name-en" style="${isPageMode ? 'font-size:0.65rem;' : ''}">${main["Item Description"] || ''}</div>
                            </div>
                            <div class="price-row">
                                <div class="price-val" style="${isPageMode ? 'font-size:1rem;' : ''}">
                                    ${main["Unit Price"] || '0.00'}
                                    <img src="${RIYAL_SVG}" class="riyal-img">
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                });
            });
        }

        function getBestImg(p) {
            let url = p.itemurl || p.itemURL || p.Image || "";
            if (url.startsWith("//")) url = "https:" + url;
            return url || 'https://via.placeholder.com/300?text=NO+IMAGE';
        }

        function imgErr(img, code) {
            if (img.dataset.triedWorker) { img.src = 'https://via.placeholder.com/300?text=NO+IMAGE'; return; }
            img.dataset.triedWorker = "true";
            fetch(WORKER_IMG + code).then(r => r.json()).then(d => { if(d.image_url) img.src = d.image_url; });
        }

        // Infinite Scroll
        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isPageMode && displayedCount < filteredData.length) { renderBatch(); }
            }, { threshold: 0.1 });
            observer.observe(document.getElementById('loadMoreTrigger'));

            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').style.display = window.scrollY > 500 ? 'flex' : 'none';
            });
        }

        // Scanner Logic
        let html5QrCode;
        function startScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => {
                    document.getElementById('globalSearch').value = decodedText;
                    stopScanner();
                    applyAllFilters();
                }
            );
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                });
            } else { document.getElementById('scannerModal').style.display = 'none'; }
        }

        // Global click to close dropdowns
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            }
        });

        bootstrap();
    </script>
</body>
</html>
