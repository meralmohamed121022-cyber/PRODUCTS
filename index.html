<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO SYSTEM - ADVANCED PRODUCT HUB</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Roboto:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --primary: #059669;
            --secondary: #10b981;
            --accent: #3b82f6;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: #fbbf24;
        }

        /* Hero & Search */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border-radius: 50px;
            border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .scanner-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .scanner-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        /* Multi-select Filters */
        .filters-grid {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-box {
            background: var(--card-dark);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .custom-dropdown {
            position: relative;
            cursor: pointer;
        }

        .dropdown-trigger {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .dropdown-item label {
            user-select: none;
        }

        .dropdown-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .dropdown-search {
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 2;
        }

        .dropdown-search input {
            width: 100%;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
        }

        /* Magazine Layout */
        .magazine-grid {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .category-header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 40px 0 20px;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
        }

        .cat-d-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 0 0 auto;
            /* Allow dynamic width */
            margin-bottom: 20px;
        }

        .subcat-header {
            width: 100%;
            background: #334155;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .product-items-flex {
            display: flex;
            flex-wrap: wrap;
            /* Default to wrap for desktop */
            gap: 15px;
            width: 100%;
            scroll-behavior: smooth;
        }

        @media (max-width: 768px) {
            .product-items-flex {
                flex-wrap: nowrap !important;
                /* Slider ONLY on mobile */
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                padding: 10px 0 15px;
                touch-action: pan-x;
                -webkit-overflow-scrolling: touch;
            }
        }

        .product-items-flex::-webkit-scrollbar {
            height: 8px;
            display: none;
        }

        /* Hide on desktop wrap */
        @media (max-width: 768px) {
            .product-items-flex::-webkit-scrollbar {
                display: block;
                height: 8px;
            }

            .product-items-flex::-webkit-scrollbar-thumb {
                background: var(--primary);
                border-radius: 10px;
            }
        }

        .cat-d-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            flex: 0 0 auto;
            /* Allow dynamic width */
            max-width: 100%;
        }

        .nav-btn {
            position: absolute;
            top: 60%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: none;
            opacity: 0.8;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-prev {
            left: -15px;
        }

        .nav-next {
            right: -15px;
        }

        @media (max-width: 768px) {
            .nav-btn {
                display: none;
            }

            .cat-d-group {
                width: 100% !important;
                max-width: 100% !important;
            }

            .product-card {
                flex: 0 0 85% !important;
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            .product-card {
                flex: 0 0 70%;
                padding: 10px;
            }
        }

        .product-items-flex::-webkit-scrollbar {
            height: 6px;
        }

        .product-items-flex::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .product-card {
            flex: 0 0 280px;
            scroll-snap-align: start;
            background: white;
            border-radius: 20px;
            padding: 15px;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            user-select: none;
            transition: transform 0.2s;
        }

        @media (max-width: 768px) {
            .product-card {
                flex: 0 0 70%;
                /* 70% width on mobile */
                padding: 10px;
            }

            .img-stack {
                height: 150px !important;
            }

            .category-header {
                font-size: 1.4rem;
                padding: 10px;
            }

            .subcat-header {
                font-size: 0.8rem;
            }
        }

        /* Printing Styles */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            
            .navbar, .hero, .filters-grid, .load-more-trigger, .scroll-top, .print-fab, .nav-btn, .mag-nav-arrow, .mag-page-indicator, .view-toggle-btn { 
                display: none !important; 
            }
            
            #mainContainer { 
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                position: relative !important;
                top: 0 !important;
            }
            
            .product-grid {
                display: block !important;
                width: 100% !important;
                margin-top: 0 !important;
            }

            .cat-d-group {
                display: block !important;
                width: 100% !important;
                break-inside: auto !important; /* Allow group to split if needed to fill space */
                margin-bottom: 20px !important;
            }

            .product-items-flex {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 10px !important;
                width: 100% !important;
            }

            .category-header {
                background: #334155 !important;
                color: white !important;
                padding: 8px 12px !important;
                font-size: 1.1rem !important;
                border-radius: 4px !important;
                margin: 10px 0 8px !important; /* Reduced margin */
                width: 100% !important;
                display: block !important;
                break-after: avoid !important;
            }
            
            /* Remove top margin from the very first header to prevent white page */
            .cat-d-group:first-child .category-header {
                margin-top: 0 !important;
            }

            .subcat-header {
                font-size: 0.75rem !important;
                padding: 4px 10px !important;
                margin-bottom: 6px !important;
                background: #64748b !important;
                color: white !important;
                width: fit-content !important;
                border-radius: 3px !important;
                break-after: avoid !important;
            }

            .product-card {
                width: 100% !important;
                min-width: 0 !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                padding: 8px !important;
                height: auto !important;
                margin: 0 !important;
                display: flex !important;
                flex-direction: column !important;
                break-inside: avoid !important; /* Prevent card from splitting */
            }

            .img-stack { height: 100px !important; width: 100% !important; }
            .name-ar { font-size: 0.75rem !important; margin-top: 5px !important; min-height: 2em !important; }
            .name-en { font-size: 0.6rem !important; }
            .price-val { font-size: 0.9rem !important; }
            .riyal-img { width: 12px !important; height: 12px !important; }

            @page { margin: 10mm; size: A4; }
        }

        /* Card Styles */
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .img-stack {
            width: 100%;
            aspect-ratio: 1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .img-stack img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stack-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: var(--accent);
            color: white;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-text {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 900;
        }

        .name-ar {
            font-size: 0.9rem;
            font-weight: 900;
            line-height: 1.3;
        }

        .name-en {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }

        .price-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .price-val {
            font-size: 1.2rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .riyal-img {
            width: 14px;
            height: 14px;
            filter: contrast(0.5);
        }

        /* Scanner Modal */
        #scannerModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scanner-box {
            width: 90%;
            max-width: 500px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        #reader {
            width: 100%;
        }

        .close-scanner {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        /* Loading More */
        .load-more-trigger {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            font-weight: 700;
        }

        /* Scroll Top & Print FAB */
        .scroll-top,
        .print-fab,
        .view-toggle-btn {
            position: fixed;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: none;
            color: white;
            font-size: 22px;
            transition: all 0.3s;
        }

        .scroll-top {
            bottom: 20px;
            background: var(--primary);
            display: none;
        }

        .print-fab {
            bottom: 90px;
            background: #ef4444;
        }

        .view-toggle-btn {
            bottom: 160px;
            background: #f59e0b;
        }

        .reset-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        /* Magazine Controls */
        .mag-nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 4500;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .mag-nav-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
            width: 80px;
        }

        .mag-nav-arrow.left {
            left: 0;
            border-radius: 0 50px 50px 0;
        }

        .mag-nav-arrow.right {
            right: 0;
            border-radius: 50px 0 0 50px;
        }

        .mag-page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900;
            color: #fbbf24;
            display: none;
            z-index: 4500;
        }

        /* Responsive Grid / Slider */
        @media (max-width: 768px) {
            .product-grid {
                display: flex !important;
                overflow-x: auto !important;
                scroll-snap-type: x mandatory !important;
                gap: 15px !important;
                padding-bottom: 15px !important;
                scrollbar-width: none;
            }

            .product-grid::-webkit-scrollbar {
                display: none;
            }

            .product-card,
            .blob-title-card {
                flex: 0 0 70% !important;
                scroll-snap-align: center !important;
            }

            .category-header {
                font-size: 1.2rem !important;
                grid-column: auto !important;
            }

            .magazine-page-view {
                padding: 20px !important;
                margin: 20px 15px 80px !important;
                min-height: 600px !important;
                border-radius: 5px !important;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8) !important;
            }
        }

        .print-fab:hover,
        .view-toggle-btn:hover,
        .scroll-top:hover {
            transform: scale(1.1);
        }

        .print-fab:hover,
        .view-toggle-btn:hover {
            transition: 0.2s;
        }
    </style>
</head>

<body>

    <div id="scannerModal">
        <div class="scanner-box">
            <button class="close-scanner" onclick="stopScanner()">✕</button>
            <div id="reader"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">🌙 MONO PRODUCT HUB</div>
        <div style="font-size: 0.8rem; font-weight: 800; color: #94a3b8;">SYSTEM v2.5</div>
    </nav>

    <div class="hero">
        <div class="search-container">
            <input type="text" id="globalSearch" class="search-bar"
                placeholder="Search by name, code, or scan barcode..." oninput="triggerFilter()">
            <button class="scanner-btn" onclick="startScanner()">📷</button>
        </div>
    </div>

    <div class="filters-grid">
        <div class="filter-box" data-field="Brand">
            <div class="filter-label">Brand</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Brands <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search brands..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level A">
            <div class="filter-label">Category A</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat A <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level B">
            <div class="filter-label">Category B</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat B <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level C">
            <div class="filter-label">Category C</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat C <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level D">
            <div class="filter-label">Category D</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat D <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search sub-cats..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Category Level E">
            <div class="filter-label">Category E</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Cat E <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search categories..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
        <div class="filter-box" data-field="Manufacture">
            <div class="filter-label">Manufacture</div>
            <div class="custom-dropdown" onclick="toggleDropdown(this, event)">
                <div class="dropdown-trigger">Select Mans <span class="selected-count">(0)</span> ▾</div>
                <div class="dropdown-menu" onclick="event.stopPropagation()">
                    <div class="dropdown-search"><input type="text" placeholder="Search manufactures..."
                            oninput="filterDropdownItems(this)"></div>
                    <div class="dropdown-list"></div>
                </div>
            </div>
        </div>
    </div>
    <div style="text-align:center; padding:10px;">
        <button class="reset-btn" onclick="resetFilters()">RESET ALL FILTERS 🔄</button>
    </div>

    <main class="magazine-grid" id="mainContainer"></main>
    <div id="loadMoreTrigger" class="load-more-trigger">Loading more products...</div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>
    <button class="print-fab" onclick="window.print()" title="Print">🖨️</button>
    <button class="view-toggle-btn" onclick="toggleViewMode()" title="Toggle Preview/Infinite">📖</button>

    <button class="mag-nav-arrow left" id="magPrev" onclick="changePage(-1)">❮</button>
    <button class="mag-nav-arrow right" id="magNext" onclick="changePage(1)">❯</button>
    <div class="mag-page-indicator" id="magIndicator">PAGE 1 OF 1</div>

    <script>
        const DB_URLS = [
            "https://raw.githubusercontent.com/meralmohamed121022-cyber/offerstestgit/refs/heads/main/products1.json",
            "https://raw.githubusercontent.com/meralmohamed121022-cyber/offerstestgit/refs/heads/main/products2.json"
        ];
        const WORKER_IMG = "https://online.meralmohamed121022.workers.dev/api/product?code=";
        const WORKER_TOKEN = ""; // 👈 ضع هنا التوكن الخاص بك (x-session-token) إذا كان الوركر يحتاجه
        const RIYAL_SVG = "https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg";

        let masterData = [];
        let filteredData = [];
        let displayedCount = 0;
        const BATCH_SIZE = 50;
        let isPageMode = false;
        let currentPage = 1;
        const ITEMS_PER_PAGE = 16;

        let selectedFilters = {
            "Brand": [],
            "Category Level A": [],
            "Category Level B": [],
            "Category Level C": [],
            "Category Level D": [],
            "Category Level E": [],
            "Manufacture": []
        };

        async function bootstrap() {
            try {
                const responses = await Promise.all(DB_URLS.map(u => fetch(u)));
                const data = await Promise.all(responses.map(r => r.json()));
                masterData = data.flat();
                filteredData = [...masterData];

                initFilters();
                renderBatch();
                setupInfiniteScroll();
            } catch (err) { console.error(err); }
        }

        function initFilters() {
            const filterMap = {
                "Brand": new Set(),
                "Category Level A": new Set(),
                "Category Level B": new Set(),
                "Category Level C": new Set(),
                "Category Level D": new Set(),
                "Category Level E": new Set(),
                "Manufacture": new Set()
            };
            masterData.forEach(p => {
                for (let key in filterMap) { if (p[key]) filterMap[key].add(p[key]); }
            });

            document.querySelectorAll('.filter-box').forEach(box => {
                const field = box.dataset.field;
                const list = box.querySelector('.dropdown-list');
                const sortedItems = Array.from(filterMap[field]).sort();

                sortedItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerHTML = `<label style="display:flex; align-items:center; gap:10px; width:100%; cursor:pointer; padding: 8px 15px;">
                        <input type="checkbox" value="${item}" onchange="onFilterChange(this, '${field}')"> 
                        <span>${item}</span>
                    </label>`;
                    list.appendChild(div);
                });
            });
        }

        function toggleDropdown(el, event) {
            if (event.target.closest('.dropdown-menu')) return;
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if (m !== el.querySelector('.dropdown-menu')) m.classList.remove('show');
            });
            el.querySelector('.dropdown-menu').classList.toggle('show');
        }

        function filterDropdownItems(input) {
            const term = input.value.toLowerCase();
            input.closest('.dropdown-menu').querySelectorAll('.dropdown-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        }

        function onFilterChange(cb, field) {
            if (cb.checked) selectedFilters[field].push(cb.value);
            else selectedFilters[field] = selectedFilters[field].filter(v => v !== cb.value);

            cb.closest('.filter-box').querySelector('.selected-count').textContent = `(${selectedFilters[field].length})`;
            applyAllFilters();
        }

        let filterTimeout;
        function triggerFilter() { clearTimeout(filterTimeout); filterTimeout = setTimeout(applyAllFilters, 300); }

        function applyAllFilters() {
            const q = document.getElementById('globalSearch').value.toLowerCase();

            filteredData = masterData.filter(p => {
                const mq = !q || p.Code.toString().includes(q) ||
                    (p["Item Description"] || "").toLowerCase().includes(q) ||
                    (p["أسم المنتج"] || "").toLowerCase().includes(q);

                let mf = true;
                for (let field in selectedFilters) {
                    if (selectedFilters[field].length > 0 && !selectedFilters[field].includes(p[field])) { mf = false; break; }
                }
                return mq && mf;
            });

            displayedCount = 0;
            currentPage = 1;
            document.getElementById('mainContainer').innerHTML = '';
            if (isPageMode) renderPage(); else renderBatch();
        }

        function resetFilters() {
            document.getElementById('globalSearch').value = '';
            for (let field in selectedFilters) {
                selectedFilters[field] = [];
                const dropdown = document.querySelector(`.filter-box[data-field="${field}"]`);
                if (dropdown) {
                    dropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    dropdown.querySelector('.selected-count').textContent = '(0)';
                }
            }
            applyAllFilters();
        }

        function toggleViewMode() {
            isPageMode = !isPageMode;
            const arrows = document.querySelectorAll('.mag-nav-arrow');
            arrows.forEach(a => a.style.display = isPageMode ? 'flex' : 'none');
            document.getElementById('magIndicator').style.display = isPageMode ? 'block' : 'none';
            document.getElementById('loadMoreTrigger').style.display = isPageMode ? 'none' : 'block';

            if (isPageMode) {
                document.body.style.background = "linear-gradient(45deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)";
            } else {
                document.body.style.background = "#0f172a";
            }

            displayedCount = 0;
            currentPage = 1;
            document.getElementById('mainContainer').innerHTML = '';
            if (isPageMode) renderPage(); else renderBatch();
        }

        function changePage(dir) {
            const max = Math.ceil(filteredData.length / ITEMS_PER_PAGE);
            if (currentPage + dir < 1 || currentPage + dir > max) return;
            currentPage += dir;
            document.getElementById('mainContainer').innerHTML = '';
            renderPage();
            const container = document.getElementById('mainContainer');
            window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        }

        function renderPage() {
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const batch = filteredData.slice(start, start + ITEMS_PER_PAGE);
            document.getElementById('magIndicator').textContent = `PAGE ${currentPage} OF ${Math.ceil(filteredData.length / ITEMS_PER_PAGE)}`;
            renderToGrid(batch);
        }

        function renderBatch() {
            const batch = filteredData.slice(displayedCount, displayedCount + BATCH_SIZE);
            if (batch.length === 0) {
                document.getElementById('loadMoreTrigger').style.display = displayedCount > 0 ? 'none' : 'block';
                if (displayedCount === 0) document.getElementById('mainContainer').innerHTML = '<div style="text-align:center; padding:40px; font-weight:900; opacity:0.5; color:white;">No products match your filters.</div>';
                return;
            }
            renderToGrid(batch, true);
            displayedCount += batch.length;
            document.getElementById('loadMoreTrigger').style.display = displayedCount < filteredData.length ? 'block' : 'none';
        }

        function getColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            const h = Math.abs(hash) % 360;
            return `hsl(${h}, 70%, 45%)`;
        }

        function renderToGrid(items, append = false) {
            const container = document.getElementById('mainContainer');
            if (!append) container.innerHTML = '';

            const groups = {};
            items.forEach(p => {
                const a = p["Category Level A"] || "UNCATEGORIZED";
                const d = p["Category Level D"] || "OTHER";
                if (!groups[a]) groups[a] = {};
                if (!groups[a][d]) groups[a][d] = [];
                groups[a][d].push(p);
            });

            let targetContainer = container;
            if (isPageMode && !append) {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'magazine-page-view magazine-grid'; // Reuse flex styles
                pageWrapper.style.cssText = "background:white; color:black; padding:40px; border-radius:10px; box-shadow:0 20px 50px rgba(0,0,0,0.5); min-height:800px; max-width:1250px; margin:0 auto 50px;";
                container.appendChild(pageWrapper);
                targetContainer = pageWrapper;
            }

            Object.entries(groups).forEach(([catA, subCats]) => {
                const colorA = getColor(catA);
                const headerA = document.createElement('div');
                headerA.className = 'category-header';
                headerA.style.background = colorA;
                headerA.textContent = catA;
                targetContainer.appendChild(headerA);

                Object.entries(subCats).forEach(([catD, itemsList]) => {
                    const colorD = getColor(catD + "sub");

                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'cat-d-group';

                    // Logic: Desktop group width = count * cardWidth (up to 4)
                    const cardWidth = 295; // Card (280) + gap (15)
                    const desktopCount = Math.min(itemsList.length, 4);
                    if (!isPageMode) {
                        groupDiv.style.width = `calc(${desktopCount} * ${cardWidth}px)`;
                        groupDiv.style.maxWidth = "100%";
                    }

                    groupDiv.innerHTML = `
                        <div class="subcat-header" style="background:${colorD}">${catD}</div>
                        <button class="nav-btn nav-prev" onclick="this.nextElementSibling.scrollBy({left: -300, behavior: 'smooth'})">❮</button>
                        <div class="product-items-flex"></div>
                        <button class="nav-btn nav-next" onclick="this.previousElementSibling.scrollBy({left: 300, behavior: 'smooth'})">❯</button>
                    `;

                    const flexBox = groupDiv.querySelector('.product-items-flex');
                    itemsList.forEach(main => {
                        const brand = main.Brand || 'Generic';
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        if (isPageMode) card.style.cssText = "border:1px solid #cbd5e1; box-shadow:none; padding:8px; width:220px;";
                        card.onclick = () => window.open(`https://www.al-dawaa.com/en/p/${main.Code}`, '_blank');

                        const nameAr = main["أسم المنتج"] || main["Item Name Ar"] || main["Product Name Ar"];
                        card.innerHTML = `
                            <div class="img-stack" style="${isPageMode ? 'height:120px;' : ''}">
                                <img src="${getBestImg(main)}" data-code="${main.Code}" onerror="imgErr(this, '${main.Code}')">
                            </div>
                            <div class="card-details">
                                ${nameAr ? `<div class="name-ar" style="color:var(--primary); font-weight:900; font-size:${isPageMode ? '0.85rem' : '1.1rem'}; margin-bottom:4px;">${nameAr}</div>` : ''}
                                <span class="brand-text">${brand}</span>
                                <div class="name-en" style="${isPageMode ? 'font-size:0.75rem;' : ''}">${main["Item Description"] || main["Item Name En"] || ''}</div>
                            </div>
                            <div class="price-row">
                                <div class="price-val" style="${isPageMode ? 'font-size:1rem;' : ''}">
                                    ${main["Unit Price"] || '0.00'}
                                    <img src="${RIYAL_SVG}" class="riyal-img">
                                </div>
                            </div>
                        `;
                        flexBox.appendChild(card);
                    });
                    targetContainer.appendChild(groupDiv);
                });
            });
        }

        function getBestImg(p) {
            let url = p.itemurl || p.itemURL || p.Image || "";
            if (!url) return `https://via.placeholder.com/1x1?text=FETCHING_${p.Code}`;
            if (url.startsWith("//")) url = "https:" + url;
            return url;
        }

        function imgErr(img, code) {
            // Stage 1: Immediate Worker Fetch (Primary API Search)
            if (!img.dataset.triedWorker) {
                img.dataset.triedWorker = "true";
                const headers = {};
                if (WORKER_TOKEN) headers['x-session-token'] = WORKER_TOKEN;
                
                fetch(WORKER_IMG + code, { headers })
                    .then(r => r.json())
                    .then(d => { 
                        if (d.image_url && d.image_url !== img.src) {
                            img.src = d.image_url; 
                        } else {
                            tryFixMirror(img);
                        }
                    })
                    .catch(() => tryFixMirror(img));
                return;
            }

            // Stage 2: Fallback Mirror Fix
            tryFixMirror(img);
        }

        function tryFixMirror(img) {
            if (!img.dataset.triedFix) {
                img.dataset.triedFix = "true";
                let src = img.src;
                if (src.includes('al-dawaa.com')) {
                    img.src = src.replace(/stgprevapi\.al-dawaa\.com|medias\.al-dawaa\.com/g, 'www.al-dawaa.com');
                    return;
                }
            }
            triggerContextSearch(img);
        }

        function triggerContextSearch(img) {
            if (!img.dataset.triedContext && img.src.includes('context=')) {
                img.dataset.triedContext = "true";
                const context = img.src.split('context=')[1];
                if (context) {
                    img.src = `https://www.al-dawaa.com/medias/?context=${context}`;
                    return;
                }
            }
            // Final fallback to placeholder
            img.src = 'https://via.placeholder.com/300?text=NO+IMAGE';
        }

        // Add a global image handler to fix referrer issues
        document.addEventListener('DOMContentLoaded', () => {
            const meta = document.createElement('meta');
            meta.name = "referrer";
            meta.content = "no-referrer-when-downgrade";
            document.head.appendChild(meta);
        });

        // Infinite Scroll
        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isPageMode && displayedCount < filteredData.length) { renderBatch(); }
            }, { threshold: 0.1 });
            observer.observe(document.getElementById('loadMoreTrigger'));

            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').style.display = window.scrollY > 500 ? 'flex' : 'none';
            });
        }

        // Scanner Logic
        let html5QrCode;
        function startScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => {
                    document.getElementById('globalSearch').value = decodedText;
                    stopScanner();
                    applyAllFilters();
                }
            );
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                });
            } else { document.getElementById('scannerModal').style.display = 'none'; }
        }

        // Global click to close dropdowns
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            }
        });

        // Robust Drag-to-Scroll
        let isDown = false;
        let startX;
        let scrollLeft;
        let moveCount = 0;
        let activeSlider = null;

        document.addEventListener('mousedown', (e) => {
            activeSlider = e.target.closest('.product-items-flex');
            if (!activeSlider) return;
            isDown = true;
            moveCount = 0;
            startX = e.pageX - activeSlider.offsetLeft;
            scrollLeft = activeSlider.scrollLeft;
            activeSlider.style.cursor = 'grabbing';
            activeSlider.style.scrollSnapType = 'none'; // Disable snap while dragging
        });

        document.addEventListener('mouseleave', () => {
            if (!isDown) return;
            isDown = false;
            if (activeSlider) {
                activeSlider.style.cursor = 'pointer';
                activeSlider.style.scrollSnapType = 'x mandatory';
            }
        });

        document.addEventListener('mouseup', () => {
            if (!isDown) return;
            isDown = false;
            if (activeSlider) {
                activeSlider.style.cursor = 'pointer';
                activeSlider.style.scrollSnapType = 'x mandatory';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDown || !activeSlider) return;
            moveCount++;
            const x = e.pageX - activeSlider.offsetLeft;
            const walk = (x - startX) * 2;
            activeSlider.scrollLeft = scrollLeft - walk;
        });

        document.addEventListener('click', (e) => {
            if (moveCount > 10 && e.target.closest('.product-card')) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        bootstrap();
    </script>
</body>

</html>
